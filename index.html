<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Graveyard: สุสานพิกเซล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap');
        
        :root {
            /* Palette จากรูปภาพ: ม่วง, ดำ, เหลืองนวล */
            --primary: #9d50bb;    /* ม่วงหลัก */
            --secondary: #2d1b4e;  /* ม่วงเข้มพื้นหลัง */
            --accent-1: #1a0b2e;   /* ม่วงเกือบดำ */
            --accent-2: #ffcc33;   /* เหลืองแสงจันทร์/ตะเกียง */
            --glow: rgba(157, 80, 187, 0.5);
            --ui-bg: rgba(26, 11, 46, 0.95);
            --ui-border: #6e44ff;
            --text-color: #f3e8ff;
        }

        body {
            font-family: 'Mali', cursive;
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-2);
            image-rendering: pixelated;
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #2d1b4e 0%, #050208 100%);
            touch-action: none;
        }

        /* พื้นหลังโลกสุสานตอนกลางคืน */
        .world {
            position: absolute;
            width: 3000px;
            height: 3000px;
            background-color: var(--accent-1);
            background-image: 
                radial-gradient(var(--secondary) 2px, transparent 4px),
                linear-gradient(rgba(110, 68, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(110, 68, 255, 0.05) 1px, transparent 1px);
            background-size: 100px 100px, 50px 50px, 50px 50px;
            transition: transform 0.15s steps(10);
            border: 40px solid #050208;
            box-sizing: border-box;
        }

        /* วิญญาณเรืองแสง */
        .entity {
            position: absolute;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            filter: drop-shadow(0 0 8px var(--glow));
        }

        .pixel-ghost {
            width: 8px;
            height: 8px;
            background: white;
            box-shadow: 
                0 8px currentColor, 8px 8px currentColor, -8px 8px currentColor,
                0 16px currentColor, 8px 16px currentColor, -8px 16px currentColor, 16px 16px currentColor, -16px 16px currentColor,
                0 24px currentColor, 8px 24px currentColor, -8px 24px currentColor, 16px 24px currentColor, -16px 24px currentColor,
                0 32px currentColor, 12px 32px currentColor, -12px 32px currentColor,
                -8px 12px #2d1b4e, 8px 12px #2d1b4e;
            animation: float 2s infinite ease-in-out;
        }

        .entity-name {
            font-size: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 35px;
            white-space: nowrap;
            border: 1px solid var(--ui-border);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* หลุมศพสไตล์หินโบราณ */
        .grave {
            position: absolute;
            cursor: pointer;
            width: 50px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            z-index: 50;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }

        /* UI Panels สไตล์เนออนม่วง */
        .ui-panel {
            position: fixed;
            background: var(--ui-bg);
            border: 3px solid var(--ui-border);
            z-index: 1000;
            display: none;
            box-shadow: 0 0 20px rgba(110, 68, 255, 0.4), inset 0 0 15px rgba(110, 68, 255, 0.2);
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            color: var(--text-color);
            backdrop-filter: blur(8px);
        }

        .pixel-button {
            background: linear-gradient(to bottom, #7c3aed, #6d28d9);
            border: 2px solid #a78bfa;
            box-shadow: 0 4px 0px #4c1d95;
            transition: all 0.1s;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .pixel-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #4c1d95;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 2, 8, 0.8);
            display: none;
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        .create-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ffcc33;
            border: 4px solid #b38f00;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            z-index: 500;
            box-shadow: 0 6px 0px #806600;
            border-radius: 15px;
            color: #1a0b2e;
            font-size: 1.1rem;
        }
        .create-btn:hover { background: #ffe066; }

        .donate-link {
            position: fixed;
            top: 25px;
            left: 25px;
            background: var(--primary);
            color: white;
            border: 3px solid #f3e8ff;
            padding: 10px 18px;
            font-weight: bold;
            z-index: 500;
            box-shadow: 0 4px 0px #6e44ff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .pixel-input {
            background: rgba(255, 255, 255, 0.05) !important;
            color: white !important;
            border: 2px solid var(--ui-border) !important;
            padding: 10px !important;
            border-radius: 12px;
            outline: none;
        }
        .pixel-input:focus { border-color: var(--accent-2) !important; }

        #conn-status {
            position: fixed;
            top: 25px;
            right: 25px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-2);
            padding: 8px 15px;
            border: 1px solid var(--ui-border);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="conn-status">🔮 กำลังเปิดเนตร...</div>
    <div class="world" id="world"></div>

    <!-- UI: Read Grave -->
    <div class="modal-overlay" id="read-overlay"></div>
    <div class="ui-panel p-8" id="read-panel" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; text-align: center;">
        <div class="text-[10px] text-purple-300 mb-2 tracking-widest uppercase">บันทึกหน้าหลุมศพ</div>
        <h2 id="read-name" class="text-2xl font-bold text-yellow-400 mb-1">...</h2>
        <p id="read-years" class="text-xs text-purple-200 mb-5 opacity-70">...</p>
        
        <div class="bg-[#1a0b2e] p-5 border-2 border-purple-500 rounded-xl mb-6 text-sm italic leading-relaxed" id="read-message">
            ...
        </div>

        <div id="ig-container" class="hidden mb-6">
            <a href="#" id="ig-link-url" rel="noopener noreferrer" target="_blank" class="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-full font-bold text-xs bg-gradient-to-r from-purple-600 to-pink-500 text-white w-full shadow-lg">
                <span id="read-ig-name">@username</span>
            </a>
        </div>
        
        <div class="flex flex-col gap-3">
            <button onclick="closeUI('read')" class="pixel-button py-3 w-full">กลับสู่สุสาน</button>
            <button id="btn-delete-grave" onclick="openDeleteConfirm()" class="text-xs text-red-400 hover:underline hidden">ถอนการจอง (เฉพาะเจ้าของ)</button>
        </div>
    </div>

    <!-- UI: Create Grave (ปรับให้คล้ายฟอร์มในรูป) -->
    <div class="modal-overlay" id="create-overlay"></div>
    <div class="ui-panel p-6" id="create-panel" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px;">
        <h2 class="text-xl font-bold mb-6 text-center text-yellow-400 border-b border-purple-800 pb-3">จารึกวิญญาณฝึกหัด</h2>
        
        <div class="mb-5">
            <label class="block text-xs font-bold mb-2 text-purple-300">รูปแบบป้ายหิน</label>
            <div class="flex justify-between gap-3 bg-black/30 p-2 rounded-lg">
                <div class="grave-option border-2 border-transparent p-1 cursor-pointer rounded-md transition-all" onclick="selectGraveStyle(0)" id="style-0">
                    <svg width="40" height="40" viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="80" fill="#4a4a4a" stroke="#fff" stroke-width="4"/></svg>
                </div>
                <div class="grave-option border-2 border-transparent p-1 cursor-pointer rounded-md transition-all" onclick="selectGraveStyle(1)" id="style-1">
                    <svg width="40" height="40" viewBox="0 0 100 100"><path d="M20 100 V40 Q20 10 50 10 Q80 10 80 40 V100 Z" fill="#5a5a5a" stroke="#fff" stroke-width="4"/></svg>
                </div>
                <div class="grave-option border-2 border-transparent p-1 cursor-pointer rounded-md transition-all" onclick="selectGraveStyle(2)" id="style-2">
                    <svg width="40" height="40" viewBox="0 0 100 100"><path d="M10 100 L10 30 L50 5 L90 30 L90 100 Z" fill="#6a6a6a" stroke="#fff" stroke-width="4"/></svg>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] uppercase text-purple-400 font-bold ml-1">ชื่อผู้วายชนม์</label>
                <input id="input-name" type="text" maxlength="15" class="pixel-input" placeholder="ระบุชื่อของคุณ...">
            </div>
            <div>
                <label class="text-[10px] uppercase text-purple-400 font-bold ml-1">คำจารึกหน้าหลุมศพ</label>
                <textarea id="input-msg" class="pixel-input h-20" maxlength="100" placeholder="ใจดีกับตัวเองให้มากๆ นะ..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] uppercase text-purple-400 font-bold">พ.ศ. เกิด-ตาย</label>
                    <input id="input-birth" type="text" class="pixel-input text-center" placeholder="25XX-25XX">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-purple-400 font-bold">Instagram (IG)</label>
                    <input id="input-ig" type="text" class="pixel-input" placeholder="@yourname">
                </div>
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="closeUI('create')" class="flex-1 py-3 bg-gray-800 rounded-xl text-gray-400 text-sm">ยกเลิก</button>
            <button onclick="confirmCreateGrave()" class="flex-2 pixel-button py-3 px-8 text-lg">จารึกป้าย</button>
        </div>
    </div>

    <!-- UI: Delete Confirm -->
    <div class="modal-overlay" id="delete-overlay"></div>
    <div class="ui-panel p-6 text-center" id="delete-panel" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px;">
        <p class="text-purple-200 mb-6">คุณต้องการถอนป้ายวิญญาณนี้ออกไปตลอดกาลใช่หรือไม่?</p>
        <div class="flex gap-3">
            <button onclick="closeUI('delete')" class="flex-1 py-2 text-sm">ไม่</button>
            <button id="btn-final-delete" onclick="handleDeleteGrave()" class="flex-1 bg-red-600 rounded-lg font-bold">ถอนป้าย</button>
        </div>
    </div>

    <!-- ปุ่มมุมจอ -->
    <a href="https://paypal.me/micksawaroot" target="_blank" rel="noopener noreferrer" class="donate-link">
        <span class="text-lg">☕</span>
        <span>เลี้ยงกาแฟ</span>
    </a>

    <div class="create-btn" onclick="openCreateUI()">จองที่ดิน / สร้างหลุมศพ</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // สำหรับใช้กับ Vercel Env Variables
    const YOUR_FIREBASE_CONFIG = V_FIREBASE_API_KEY;

    const APP_ID = "pixel-graveyard-v1";
    let app, auth, db, myId;
    const isMock = YOUR_FIREBASE_CONFIG.apiKey.includes("V_FIREBASE");
    
    // ตั้งค่าตัวละคร
    const ghostColors = ["#f3e8ff", "#bf5fff", "#9d50bb", "#7c3aed"];
    const ghostNames = ["ผีฝึกหัด", "วิญญาณหลงทาง", "เจ้าที่พิกเซล", "ดวงจิตน้อย"];
    let myData = {
        name: ghostNames[Math.floor(Math.random() * ghostNames.length)] + " #" + Math.floor(Math.random() * 999),
        color: ghostColors[Math.floor(Math.random() * ghostColors.length)],
        x: 1500, y: 1500
    };
    
    let targetPos = { x: 1500, y: 1500 };
    let graves = {};
    let lastUpdate = 0;
    const world = document.getElementById('world');

    // ฟังก์ชันวาดหลุมศพให้ดูมีสไตล์ขึ้น
    function getGravePath(style) {
        const paths = [
            '<rect x="25" y="20" width="50" height="70" rx="5" fill="#4a4e69" stroke="#9d50bb" stroke-width="4"/><line x1="40" y1="40" x2="60" y2="40" stroke="#9d50bb" stroke-width="3"/><line x1="50" y1="30" x2="50" y2="55" stroke="#9d50bb" stroke-width="3"/>',
            '<path d="M25 90 V40 Q25 15 50 15 Q75 15 75 40 V90 Z" fill="#3d3d3d" stroke="#6e44ff" stroke-width="4"/><circle cx="50" cy="45" r="8" fill="#6e44ff"/>',
            '<path d="M15 90 L15 35 L50 10 L85 35 L85 90 Z" fill="#2a2a2a" stroke="#bf5fff" stroke-width="4"/><path d="M40 45 L60 45 M50 35 L50 55" stroke="#bf5fff" stroke-width="2"/>'
        ];
        return paths[style] || paths[0];
    }

    // --- ระบบ Logic เหมือนเดิมแต่เปลี่ยนสี/UI ---
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    function safeText(str) { const div = document.createElement('div'); div.textContent = str || ""; return div.innerText; }

    function updatePlayerUI() {
        const sw = window.innerWidth;
        const sh = window.innerHeight;
        world.style.transform = `translate(${sw/2 - myData.x}px, ${sh/2 - myData.y}px)`;
        renderEntity('me', myData);
        if (Date.now() - lastUpdate > 300 && myId && !isMock) {
            setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'players', myId), { ...myData, lastActive: serverTimestamp() }, { merge: true });
            lastUpdate = Date.now();
        }
    }

    function renderEntity(id, data) {
        let el = document.getElementById('ghost-' + id);
        if (!el) {
            el = document.createElement('div'); el.id = 'ghost-' + id; el.className = 'entity';
            el.innerHTML = `<div class="entity-name"></div><div class="pixel-ghost"></div>`;
            world.appendChild(el);
        }
        el.style.left = data.x + 'px'; el.style.top = data.y + 'px';
        el.querySelector('.entity-name').textContent = data.name;
        el.querySelector('.pixel-ghost').style.color = data.color;
    }

    function renderGraves() {
        const currentIds = Object.keys(graves);
        document.querySelectorAll('.grave').forEach(g => { if (!currentIds.includes(g.dataset.id)) g.remove(); });
        currentIds.forEach(id => {
            const data = graves[id];
            let div = document.querySelector(`.grave[data-id="${id}"]`);
            if (!div) {
                div = document.createElement('div'); div.className = 'grave'; div.dataset.id = id;
                div.onclick = (e) => { e.stopPropagation(); showInfo(id, data); };
                world.appendChild(div);
            }
            div.style.left = data.x + 'px'; div.style.top = data.y + 'px';
            div.innerHTML = `<svg width="60" height="60" viewBox="0 0 100 100">${getGravePath(data.style)}</svg><div class="text-[8px] text-purple-300 mt-1">${safeText(data.name).substring(0,6)}</div>`;
        });
    }

    async function init() {
        if (isMock) { document.getElementById('conn-status').innerText = "🔮 โหมดทดลอง (Offline)"; gameLoop(); return; }
        try {
            app = initializeApp(YOUR_FIREBASE_CONFIG);
            auth = getAuth(app); db = getFirestore(app);
            const user = await signInAnonymously(auth);
            myId = user.user.uid;
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'players'), (s) => {
                s.docChanges().forEach(c => { if(c.doc.id !== myId) renderEntity(c.doc.id, c.doc.data()); });
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'graves'), (s) => {
                s.forEach(d => { graves[d.id] = { ...d.data(), id: d.id }; });
                renderGraves();
            });
            document.getElementById('conn-status').innerText = "👻 " + myData.name;
            gameLoop();
        } catch (e) { document.getElementById('conn-status').innerText = "❌ ขัดข้อง"; }
    }

    function gameLoop() {
        const dx = targetPos.x - myData.x;
        const dy = targetPos.y - myData.y;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            myData.x += dx * 0.1; myData.y += dy * 0.1; updatePlayerUI();
        }
        requestAnimationFrame(gameLoop);
    }

    // --- UI Actions ---
    window.openCreateUI = () => { document.getElementById('create-overlay').style.display = 'block'; document.getElementById('create-panel').style.display = 'block'; };
    window.closeUI = (t) => { document.getElementById(t + '-overlay').style.display = 'none'; document.getElementById(t + '-panel').style.display = 'none'; };
    window.selectGraveStyle = (i) => {
        document.querySelectorAll('.grave-option').forEach((el, idx) => el.style.borderColor = idx === i ? '#ffcc33' : 'transparent');
        window.selectedStyle = i;
    };
    window.selectedStyle = 0;

    window.confirmCreateGrave = async () => {
        const name = document.getElementById('input-name').value;
        const msg = document.getElementById('input-msg').value;
        if(!name || !msg) return alert("กรุณาจารึกชื่อและข้อความ");
        await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'graves'), {
            ownerId: myId, x: myData.x, y: myData.y,
            name: safeText(name), msg: safeText(msg),
            years: safeText(document.getElementById('input-birth').value),
            ig: safeText(document.getElementById('input-ig').value.replace('@','')),
            style: window.selectedStyle, createdAt: serverTimestamp()
        });
        closeUI('create');
    };

    window.showInfo = (id, data) => {
        window.readingId = id;
        document.getElementById('read-name').innerText = data.name;
        document.getElementById('read-years').innerText = data.years || "ไม่ระบุปี";
        document.getElementById('read-message').innerText = data.msg;
        const igC = document.getElementById('ig-container');
        if (data.ig) {
            igC.classList.remove('hidden');
            document.getElementById('read-ig-name').innerText = '@' + data.ig;
            document.getElementById('ig-link-url').href = `https://instagram.com/${data.ig}`;
        } else igC.classList.add('hidden');
        document.getElementById('btn-delete-grave').classList.toggle('hidden', data.ownerId !== myId);
        document.getElementById('read-overlay').style.display = 'block';
        document.getElementById('read-panel').style.display = 'block';
    };

    window.handleWorldClick = (e) => {
        if (e.target.closest('.ui-panel') || e.target.closest('.create-btn') || e.target.closest('.donate-link')) return;
        const sw = window.innerWidth, sh = window.innerHeight;
        targetPos.x = clamp(e.clientX - (sw/2 - myData.x), 50, 2950);
        targetPos.y = clamp(e.clientY - (sh/2 - myData.y), 50, 2950);
    };

    document.getElementById('game-container').addEventListener('mousedown', window.handleWorldClick);
    window.onload = init;
</script>
</body>
</html>
